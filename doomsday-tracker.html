<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doomsday Watch — Marvel Rewatch Tracker</title>
<style>
  :root{
    --void:#0a0a09;
    --panel:#131311;
    --panel-2:#1a1a17;
    --rust:#8a7a5c;
    --rust-dim:#5c5340;
    --green:#3ddc6f;
    --green-dim:#1f6e3f;
    --green-glow: rgba(61,220,111,0.35);
    --text:#e9e6dd;
    --text-muted:#948f82;
    --text-faint:#615c50;
    --line: rgba(138,122,92,0.25);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--void);
    color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    padding:0 0 3rem;
  }
  .wrap{max-width:760px;margin:0 auto;padding:1.5rem 1.25rem 0;}

  /* ---- Logo ---- */
  .logo-row{
    display:flex;align-items:center;gap:14px;
    padding:1.25rem 0 1.5rem;
    border-bottom:1px solid var(--line);
  }
  .emblem{
    position:relative;
    width:52px;height:52px;flex:none;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #2a2a24, #0d0d0b 70%);
    border:1px solid var(--rust);
    display:flex;align-items:center;justify-content:center;
    box-shadow: 0 0 18px var(--green-glow), inset 0 0 10px rgba(61,220,111,0.15);
  }
  .emblem svg{width:30px;height:30px;}
  .wordmark{display:flex;flex-direction:column;}
  .wordmark .top{
    font-size:11px;letter-spacing:3px;color:var(--rust);
    font-weight:600;text-transform:uppercase;
  }
  .wordmark .main{
    font-size:26px;letter-spacing:2px;font-weight:700;
    color:var(--text);text-transform:uppercase;
    text-shadow: 0 0 14px var(--green-glow);
  }
  .wordmark .main span{color:var(--green);}

  /* ---- Mode toggle ---- */
  .mode-toggle{
    display:flex;gap:0;margin:1.25rem 0 1rem;
    border:1px solid var(--line);border-radius:8px;overflow:hidden;
  }
  .mode-toggle button{
    flex:1;padding:10px 12px;background:var(--panel);color:var(--text-muted);
    border:none;font-size:13px;font-weight:600;letter-spacing:0.5px;
    cursor:pointer;text-transform:uppercase;
  }
  .mode-toggle button.active{
    background:var(--green-dim);color:#eafff0;
  }
  .mode-toggle button:first-child{border-right:1px solid var(--line);}

  /* ---- Progress ---- */
  .progress-card{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:1rem 1.1rem;margin-bottom:1.25rem;
  }
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .progress-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
  .progress-pct{font-size:22px;font-weight:700;color:var(--green);}
  .progress-track{
    height:8px;border-radius:4px;background:var(--panel-2);
    overflow:hidden;border:1px solid var(--line);
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg, var(--green-dim), var(--green));
    box-shadow:0 0 8px var(--green-glow);
    transition:width .35s ease;
  }
  .progress-count{margin-top:6px;font-size:12.5px;color:var(--text-muted);}

  /* ---- Tabs ---- */
  .tabs{
    display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:1.25rem;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{
    flex:none;padding:8px 13px;background:var(--panel);border:1px solid var(--line);
    border-radius:20px;color:var(--text-muted);font-size:12.5px;font-weight:600;
    cursor:pointer;white-space:nowrap;
  }
  .tab-btn.active{
    background:var(--rust-dim);color:var(--text);border-color:var(--rust);
  }

  /* ---- Groups ---- */
  .group{margin-bottom:1.75rem;}
  .group-head{
    display:flex;align-items:baseline;gap:10px;margin-bottom:.5rem;
    padding-bottom:6px;border-bottom:1px solid var(--line);
  }
  .group-head h2{
    font-size:14px;margin:0;letter-spacing:1px;text-transform:uppercase;color:var(--text);
  }
  .group-head .count{font-size:11.5px;color:var(--text-faint);}
  .subgroup-head{
    font-size:12px;color:var(--rust);text-transform:uppercase;letter-spacing:1px;
    margin:14px 0 6px;padding-left:2px;
  }

  /* ---- List items ---- */
  .item{
    display:flex;align-items:center;gap:12px;
    padding:9px 4px;border-bottom:1px solid rgba(138,122,92,0.12);
    cursor:pointer;
  }
  .item.unreleased{opacity:0.45;cursor:default;}
  .check{
    width:20px;height:20px;flex:none;border-radius:5px;
    border:1.5px solid var(--rust);
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
  }
  .item.watched .check{
    background:var(--green);border-color:var(--green);
    box-shadow:0 0 8px var(--green-glow);
  }
  .check svg{width:12px;height:12px;opacity:0;transition:opacity .15s ease;}
  .item.watched .check svg{opacity:1;}
  .item-title{flex:1;font-size:14.5px;}
  .item.watched .item-title{color:var(--text-muted);text-decoration:line-through;text-decoration-color:var(--text-faint);}
  .item-year{font-size:12.5px;color:var(--text-faint);flex:none;}
  .badge-upcoming{
    font-size:10px;color:var(--rust);border:1px solid var(--rust-dim);
    padding:1px 6px;border-radius:10px;text-transform:uppercase;flex:none;
  }

  .footer-note{
    margin-top:2rem;font-size:12px;color:var(--text-faint);
    border-top:1px solid var(--line);padding-top:1rem;
    display:flex;justify-content:space-between;align-items:center;gap:1rem;
  }
  .reset-btn{
    background:none;border:1px solid var(--line);color:var(--text-muted);
    font-size:11.5px;padding:6px 10px;border-radius:6px;cursor:pointer;
  }
  .reset-btn:hover{border-color:var(--rust);color:var(--text);}
  .empty{font-size:13px;color:var(--text-faint);padding:1rem 0;}
</style>
</head>
<body>
<div class="wrap">

  <div class="footer-note">

const UNIVERSE_LABELS = {
  "mcu-film":"MCU films",
  "mcu-series":"Disney+ / MCU series",
  "netflix":"Netflix Defenders",
  "fox":"Fox universe",
  "sony":"Sony (Spider-Man properties)"
};
const UNIVERSE_ORDER = ["mcu-film","mcu-series","netflix","fox","sony"];
const SUBGROUP_ORDERS = {
  "fox": ["X-Men saga","Wolverine","Deadpool","Fantastic Four (Fox era)","New Mutants"],
  "sony": ["Raimi trilogy","Amazing Spider-Man","Spider-Man Universe (SSU)","Spider-Verse (animated)"]
};

let watched = new Set();
let mode = "core";        // "core" | "expanded"
let activeTab = "all";    // "all" | universe key

const STORAGE_KEY = "watched-titles";

async function loadProgress(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      watched = new Set(JSON.parse(res.value));
    }
    document.getElementById("storage-status").textContent = "Progress saved on this device";
  }catch(e){
    document.getElementById("storage-status").textContent = "Progress saved on this device";
  }
  render();
}

async function saveProgress(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify([...watched]), false);
  }catch(e){
    console.error("Could not save progress", e);
  }
}

function toggleWatched(id){
  if(watched.has(id)) watched.delete(id); else watched.add(id);
  saveProgress();
  render();
}

function itemsForMode(list){
  return mode === "core" ? list.filter(i => i.core) : list;
}

function buildTabs(){
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  if(mode === "core"){
    // Core path only ever contains MCU films, so that's the only tab.
    activeTab = "mcu-film";
    const btn = document.createElement("button");
    btn.className = "tab-btn active";
    btn.textContent = UNIVERSE_LABELS["mcu-film"];
    tabs.appendChild(btn);
    return;
  }

  if(activeTab === "mcu-film" && mode === "expanded"){
    // coming from core mode, default back to "all" in expanded view
    activeTab = "all";
  }

  const all = document.createElement("button");
  all.className = "tab-btn" + (activeTab === "all" ? " active" : "");
  all.textContent = "All";
  all.onclick = () => { activeTab = "all"; render(); };
  tabs.appendChild(all);

  UNIVERSE_ORDER.forEach(u => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (activeTab === u ? " active" : "");
    btn.textContent = UNIVERSE_LABELS[u];
    btn.onclick = () => { activeTab = u; render(); };
    tabs.appendChild(btn);
  });
}

function renderItem(item){
  const isWatched = watched.has(item.id);
  const el = document.createElement("div");
  el.className = "item" + (isWatched ? " watched" : "") + (!item.released ? " unreleased" : "");
  el.innerHTML = `
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a09" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <div class="item-title">${item.title}</div>
    ${!item.released ? '<span class="badge-upcoming">Upcoming</span>' : ''}
    <div class="item-year">${item.year}</div>
  `;
  if(item.released){
    el.onclick = () => toggleWatched(item.id);
  }
  return el;
}

function render(){
  buildTabs();

  const scoped = itemsForMode(DATA);
  const forStats = scoped.filter(i => i.released);
  const total = forStats.length;
  const done = forStats.filter(i => watched.has(i.id)).length;
  const pct = total ? Math.round((done/total)*100) : 0;

  document.getElementById("progress-label").textContent =
    (mode === "core" ? "Core path progress" : "Expanded universe progress");
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-count").textContent = `${done} of ${total} watched`;

  document.getElementById("mode-core").classList.toggle("active", mode==="core");
  document.getElementById("mode-expanded").classList.toggle("active", mode==="expanded");

  const list = document.getElementById("list");
  list.innerHTML = "";

  const universesToShow = activeTab === "all" ? UNIVERSE_ORDER : [activeTab];

  let renderedAny = false;

  universesToShow.forEach(u => {
    let group = scoped.filter(i => i.universe === u);
    if(mode === "core") group = group.filter(i => i.core);
    if(group.length === 0) return;
    renderedAny = true;

    const groupEl = document.createElement("div");
    groupEl.className = "group";

    const head = document.createElement("div");
    head.className = "group-head";
    const watchedInGroup = group.filter(i => i.released && watched.has(i.id)).length;
    const releasedInGroup = group.filter(i => i.released).length;
    head.innerHTML = `<h2>${UNIVERSE_LABELS[u]}</h2><span class="count">${watchedInGroup}/${releasedInGroup}</span>`;
    groupEl.appendChild(head);

    if(SUBGROUP_ORDERS[u]){
      SUBGROUP_ORDERS[u].forEach(sub => {
        const subItems = group.filter(i => i.subgroup === sub);
        if(subItems.length === 0) return;
        const subHead = document.createElement("div");
        subHead.className = "subgroup-head";
        subHead.textContent = sub;
        groupEl.appendChild(subHead);
        subItems.forEach(i => groupEl.appendChild(renderItem(i)));
      });
    } else {
      group.forEach(i => groupEl.appendChild(renderItem(i)));
    }

    list.appendChild(groupEl);
  });

  if(!renderedAny){
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "Nothing in this universe for the current path. Switch to Expanded universe to see it.";
    list.appendChild(empty);
  }
}

document.getElementById("mode-core").onclick = () => { mode = "core"; render(); };
document.getElementById("mode-expanded").onclick = () => { mode = "expanded"; render(); };
document.getElementById("reset-btn").onclick = async () => {
  if(confirm("Clear all watched progress on this device?")){
    watched = new Set();
    await saveProgress();
    render();
  }
};

loadProgress();
</script>
</body>
</html>
